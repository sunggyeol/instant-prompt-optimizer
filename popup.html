<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instant Prompt Optimizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    * { scrollbar-width: none; -ms-overflow-style: none; }
    *::-webkit-scrollbar { display: none; }

    body {
      width: 320px;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0b;
      color: #e5e5e7;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      padding: 24px 20px 16px;
      text-align: center;
      border-bottom: 1px solid #1a1a1d;
    }

    .title {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #f5f5f7;
    }

    .subtitle {
      font-size: 12px;
      color: #6e6e73;
      margin-top: 4px;
      font-weight: 300;
    }

    .section {
      padding: 16px 20px;
      border-bottom: 1px solid #1a1a1d;
      transition: background 0.15s ease;
    }

    .section:hover { background: #0e0e10; }

    .label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #6e6e73;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-row input {
      flex: 1;
      min-width: 0;
      padding: 0 12px;
      background: #111113;
      border: 1px solid #1f1f23;
      border-radius: 8px;
      color: #e5e5e7;
      font-size: 13px;
      font-family: inherit;
      height: 34px;
      transition: border-color 0.15s ease;
    }

    .input-row input::placeholder { color: #3a3a3f; }

    .input-row input:focus {
      outline: none;
      border-color: #3a3a3f;
    }

    .input-row input.valid { border-color: #34c759; }
    .input-row input.invalid { border-color: #ff453a; }

    .btn {
      padding: 0 14px;
      height: 34px;
      background: #e5e5e7;
      border: none;
      border-radius: 8px;
      color: #0a0a0b;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s ease;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover:not(:disabled) { background: #f5f5f7; }
    .btn:disabled { opacity: 0.3; cursor: default; }

    .link {
      display: block;
      font-size: 11px;
      color: #48484d;
      margin-top: 8px;
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .link:hover { color: #e5e5e7; }

    /* Status */
    .status {
      padding: 10px 20px;
      border-bottom: 1px solid #1a1a1d;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #6e6e73;
    }

    .status-indicator {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-ready { background: #34c759; }
    .status-error { background: #ff453a; }
    .status-loading { background: #ff9f0a; animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Site status */
    .site-status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .site-info {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1;
    }

    .site-indicator {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .site-indicator.active { background: #34c759; }
    .site-indicator.inactive { background: #48484d; }

    .site-hostname {
      font-size: 13px;
      color: #e5e5e7;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .site-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 500;
      color: #6e6e73;
      background: rgba(255,255,255,0.06);
      padding: 2px 8px;
      border-radius: 4px;
      margin-top: 8px;
      letter-spacing: 0.03em;
    }

    .btn-sm {
      padding: 0 12px;
      height: 28px;
      font-size: 11px;
    }

    .btn-danger {
      background: rgba(255, 69, 58, 0.12);
      color: #ff453a;
    }

    .btn-danger:hover:not(:disabled) {
      background: rgba(255, 69, 58, 0.2);
    }

    /* Sites list */
    .sites-list { margin-top: 10px; }
    .sites-list:empty { display: none; }

    .activated-site-item {
      display: flex;
      align-items: center;
      padding: 6px 10px;
      background: #111113;
      border: 1px solid #1f1f23;
      border-radius: 8px;
      margin-bottom: 4px;
      transition: all 0.15s ease;
      animation: slide-in 0.2s ease forwards;
      opacity: 0;
      transform: translateY(4px);
    }

    @keyframes slide-in {
      to { opacity: 1; transform: translateY(0); }
    }

    .activated-site-item:hover { border-color: #3a3a3f; }
    .activated-site-item:last-child { margin-bottom: 0; }

    .activated-site-indicator {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #34c759;
      flex-shrink: 0;
      margin-right: 10px;
    }

    .activated-site-info { flex: 1; min-width: 0; }

    .activated-site-url {
      font-size: 12px;
      color: #e5e5e7;
      font-weight: 400;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .remove-site-btn {
      background: none;
      border: none;
      color: #3a3a3f;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    .remove-site-btn:hover {
      color: #ff453a;
      background: rgba(255, 69, 58, 0.1);
    }

    /* Instructions */
    .instructions ol {
      padding-left: 16px;
      font-size: 12px;
      color: #48484d;
      line-height: 1.8;
    }

    .footer {
      padding: 12px 20px;
      text-align: center;
      font-size: 11px;
      color: #3a3a3f;
    }

    .icon {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="title">Instant Prompt Optimizer</h1>
      <p class="subtitle">Optimize text for AI clarity</p>
    </header>

    <section class="section">
      <label class="label">API Key</label>
      <div class="input-row">
        <input type="password" id="apiKeyInput" placeholder="Gemini API key" />
        <button id="saveApiKey" class="btn">Save</button>
      </div>
      <a class="link" href="https://aistudio.google.com/app/apikey" target="_blank">Get free API key &rarr;</a>
    </section>

    <div class="status" style="display: none;">
      <span class="status-indicator" id="statusIndicator"></span>
      <span id="statusContent"></span>
    </div>

    <section class="section" id="currentSiteSection">
      <label class="label">Current Website</label>
      <div class="site-status" id="siteStatus">
        <div class="site-status-row">
          <div class="site-info">
            <span class="site-indicator" id="siteIndicator"></span>
            <span class="site-hostname" id="siteHostname">—</span>
          </div>
          <button id="toggleSiteBtn" class="btn btn-sm" style="display:none;">Activate</button>
        </div>
        <span class="site-badge" id="siteBadge" style="display:none;">Default</span>
      </div>
      <div id="activatedSitesList" class="sites-list"></div>
    </section>

    <section class="section instructions">
      <label class="label">How to use</label>
      <ol>
        <li>Select text in any input field</li>
        <li>Click Optimize in the popup</li>
        <li>Replace or copy the result</li>
      </ol>
    </section>

    <footer class="footer">
      Active on Claude, ChatGPT, Gemini, Perplexity, Grok, Meta AI & Copilot
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
